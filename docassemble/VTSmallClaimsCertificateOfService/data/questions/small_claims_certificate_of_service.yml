# include this yml file when you need to include a VT Small Claims Certificate of Service in your guided interview

# add this to the user bundle: VT_small_claims_certificate_of_service_attachment

---
objects:
  - attorneys: ALPeopleList.using(ask_number=True,target_number=1)
  - other_parties: ALPeopleList.using(object_type=ALIndividual, there_are_any=True, complete_attribute='complete')
---
objects:
  - VT_small_claims_certificate_of_service_attachment: ALDocument.using(title="Your Certificate of Service", filename="small_claims_certificate_of_service_100_00260.pdf", enabled=True, has_addendum=False)
---
attachments:
  - name: VT small claims certificate of service attachment
    filename: small_claims_certificate_of_service_100_00260.pdf    
    variable name: VT_small_claims_certificate_of_service_attachment[i]        
    skip undefined: True
    pdf template file: small_claims_certificate_of_service_100_00260.pdf
    fields:
      - "COS_trial_court_county": ${ user_selected_county }
      - "COS_docket_number": ${ docket_number }
      - "COS_plaintiff": |
          % if user_role == "plaintiff":
          ${ users[0] }
          % else:
          ${ other_parties.short_list(2) if other_parties.number_gathered() > 1 else other_parties[0]}
          % endif
      - "COS_defendant": |
          % if not user_role == "plaintiff":
          ${ users[0] }
          % else:
          ${ other_parties.short_list(1) if other_parties.number_gathered() > 1 else other_parties[0]}
          % endif
      - "COS_name_full": ${ attorneys[0] if user_has_attorney else users[0] }
      - "mailed_summons": 
      - "mailed_complaint": 
      - "mailed_info_and_instructions_for_defendant": 
      - "mailed_blank_answer_form": 
      - "mailed_documents_attached_to_complaint": 
      - "mailed_answer": |
          % if defined("was_sued"):
          ${ True }
          % else:
          $ { False }
          % endif
      - "mailed_disclosure_exempt_income": |
          % if len(has_exempt_income_state.true_values()) > 0:
          ${ True }
          % elif len(has_exempt_income_other.true_values()) > 0:
          ${ True }
          % elif otherwise_exempt != '':
          ${ True }
          % else:
          $ { False }
          % endif
      - "other_document": ${ other_document }
      - "other_document_describe": ${ other_document_describe }
      - "COS_signer_name": ${ attorneys[0] if user_has_attorney else users[0] }
      - "COS_mailing_address_line_one": |
          % if defined("users[0].mailing_address.address"):
          ${ attorneys[0].address.line_one() if user_has_attorney else users[0].mailing_address.line_one() }
          % else:
          ${ attorneys[0].address.line_one() if user_has_attorney else users[0].address.line_one() }
          % endif
      - "COS_mailing_address_line_two":  |
          % if defined("users[0].mailing_address.address"):
          ${ attorneys[0].address.line_two() if user_has_attorney else users[0].mailing_address.line_two() }
          % else:
          ${ attorneys[0].address.line_two() if user_has_attorney else users[0].address.line_two() }
          % endif
      - "COS_phone_number": ${ phone_number_formatted(attorneys[0].daytime_phone_number) if user_has_attorney else phone_number_formatted(users[0].phone_number) }
      - "COS_email": ${ attorneys[0].email if user_has_attorney else users[0].email }
---
---
code:
  interview_order_VT_SC_COS = True
---